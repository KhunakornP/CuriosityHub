version: '3.8'

services:
  video-storage:
    build:
      context: ./services/FileSystemVideoStorage
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - video_data:/app/videos

  video-upload-queue:
    build:
      context: ./services/VideoUploadQueue
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
      video-storage:
        condition: service_started

  video-streaming:
    build:
      context: ./services/VideoStreaming
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      mongodb:
        condition: service_started
      video-storage:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  video-views:
    build:
      context: ./services/VideoViews
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017
      - ConnectionStrings__RabbitMq=rabbitmq
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  video-metadata:
    build:
      context: ./services/VideoMetadata
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017
      - ConnectionStrings__RabbitMq=rabbitmq
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  video_data:
  mongo_data:
